<html> 
<head> 
<meta charset="UTF-8"/> 
<title>New Year Countdown</title> 
<link rel="stylesheet" href="style.css" /> 
</head> 
<body> 
<div id="year" class="year"></div> 
<h1>Счетчик Новый Год</h1> 
<div id="countdown" class="countdown"> 

<div class="time"> 
<h2 id="days">00</h2> 
<small>дни</small> 
</div> 

<div class="time"> 
<h2 id="hours">00</h2> 
<small>часы</small> 
</div> 

<div class="time"> 
<h2 id="minutes">00</h2> 
<small>минуты</small> 
</div> 

<div class="time"> 
<h2 id="seconds">00</h2> 
<small>секунды</small> 
</div> 

</div>

<img 
src="spinner.gif" 
alt="Loading..." 
id="loading" 
class="loading" 
/> 
<script src="script.js"></script> 
</body> 
</html>
